<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Danowski Visual Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--bone:#F0EDE6;--dark-bg:#0E0E0C;
  --border-gold:rgba(201,168,76,0.14);--nav-h:90px;
  --font-mono:'Space Mono',monospace;--tr:0.25s ease;
}
html,body{height:100%}
body{background:var(--dark-bg);color:var(--bone);font-family:var(--font-mono);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* Nav */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;
  display:flex;align-items:center;
  background:rgba(10,10,9,0.45);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  box-shadow:0 1px 0 var(--border-gold);
  transition:background var(--tr);
}
#nav.scrolled{background:rgba(14,14,12,.77)}
.nav-inner{
  max-width:1200px;margin:0 auto;padding:0 32px;width:100%;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:32px;
}
.nav-logo-wrap{display:flex;align-items:center;line-height:0}
.nav-logo-wrap img{display:block;height:28px;width:auto}
.nav-links{display:flex;align-items:center;justify-content:center;gap:40px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,237,230,.45);transition:color var(--tr)}
.nav-links a:hover{color:rgba(240,237,230,.9)}
.nav-right{display:flex;justify-content:flex-end}
.nav-cta{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(201,168,76,.35);
  padding:10px 22px;transition:var(--tr);white-space:nowrap;
}
.nav-cta:hover{background:rgba(201,168,76,.08);border-color:var(--gold)}
@media(max-width:768px){.nav-links{display:none}.nav-inner{grid-template-columns:1fr auto}}

/* Splash */
.splash{
  height:100vh;display:flex;align-items:center;justify-content:center;
}
.splash img{width:200px;height:200px}
</style>
</head>
<body>
<nav id="nav" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="danowski-portfolio.html" class="nav-logo-wrap" aria-label="Paul Danowski Visual Design">
      <img src="img/PDWordMark_white.svg" alt="Paul Danowski Visual Design">
    </a>
    <ul class="nav-links">
      <li><a href="danowski-portfolio.html#work">Work</a></li>
      <li><a href="danowski-portfolio.html#about">About</a></li>
      <li><a href="danowski-portfolio.html#services">Services</a></li>
      <li><a href="danowski-portfolio.html#contact">Contact</a></li>
    </ul>
    <div class="nav-right"><a href="danowski-portfolio.html#contact" class="nav-cta">Hire Me</a></div>
  </div>
</nav>
<main class="splash">
  <img src="img/PDLetterMark_All_White.svg" alt="PD">
</main>
</body>
</html>
